# Прокси из .env (PROXY_*, HTTP_PROXY, …) нужны только cookie_manager.
# Остальные сервисы с env_file получают эти переменные обнулённые ниже.
x-strip-proxy-env: &strip-proxy-env
  HTTP_PROXY: ""
  HTTPS_PROXY: ""
  http_proxy: ""
  https_proxy: ""
  ALL_PROXY: ""
  all_proxy: ""
  PROXY_SERVER: ""
  PROXY_USERNAME: ""
  PROXY_PASSWORD: ""
  CHANGE_IP_URL: ""

services:
  html_to_markdown:
    build:
      context: ./packages/go-html-to-md
      dockerfile: Dockerfile
    container_name: html_to_markdown
    restart: unless-stopped
    ports:
      - "8090:8080"  # Go service
    environment:
      - PORT=8080
      - ENV=production
      - TZ=Europe/Moscow
    networks:
      - flipper_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  cookie_manager:
    build:
      context: ./services/cookie_manager
      dockerfile: Dockerfile
    container_name: cookie_manager
    restart: unless-stopped
    ports:
      - "8000:8000"  # FastAPI
      - "8080:8080"  # NoVNC
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./services/cookie_manager/cookies.json:/app/cookies.json
    depends_on:
      - app_redis
    networks:
      - flipper_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  parser_cian:
    build:
      context: .  # Контекст - корень проекта
      dockerfile: ./services/parser_cian/Dockerfile
    container_name: parser_cian
    env_file:
      - .env
    # Списки Cian: прокси из data/proxies.txt (USE_PROXIES_FOR_SEARCH / CIAN_PROXIES_FILE в .env)
    # HTML_TO_MARKDOWN_URL=http://html_to_markdown:8080 — опционально для cianparser
    #
    # Firecrawl: имя flippercrawl-api-1 из другого compose часто НЕ резолвится в DNS → Errno -2.
    # По умолчанию — хост с опубликованным портом 3002 (как у test_parser с localhost).
    # Своя сеть: в .env задайте PARSER_FIRECRAWL_BASE_URL=http://flippercrawl-api-1:3002 (или имя сервиса из их compose).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Europe/Moscow
      <<: *strip-proxy-env
      FIRECRAWL_BASE_URL: "${PARSER_FIRECRAWL_BASE_URL:-http://host.docker.internal:3002}"
      # SQLite WAL на ./data с Windows часто даёт disk I/O — DELETE стабильнее для bind-mount
      CIAN_SQLITE_JOURNAL_MODE: "${CIAN_SQLITE_JOURNAL_MODE:-DELETE}"
    volumes:
      - ./credentials.json:/app/credentials.json
      # Тот же ./data, что в репозитории (parser_cian.db виден на хосте). Если снова I/O error —
      # временно замените на named volume parser_cian_data:/app/data и скопируйте БД docker cp.
      - ./data:/app/data
    depends_on:
      cookie_manager:
        condition: service_healthy
      html_to_markdown:
        condition: service_healthy
    networks:
      - flipper_network
      - firecrawl_backend  # Прямой доступ к Firecrawl-контейнеру
    profiles:
      - manual  # Запускается только вручную

  category_counter:
    build:
      context: .  # Контекст - корень проекта
      dockerfile: ./services/category_counter/Dockerfile
    container_name: category_counter
    env_file:
      - .env
    environment:
      TZ: Europe/Moscow
      PYTHONPATH: /app
      <<: *strip-proxy-env
    volumes:
      - ./credentials.json:/app/credentials.json
    depends_on:
      html_to_markdown:
        condition: service_healthy
    networks:
      - flipper_network
    profiles:
      - manual  # Запускается только вручную

  app_redis:
    image: redis:alpine
    container_name: app_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - flipper_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  flipper_network:
    driver: bridge
  firecrawl_backend:
    external: true  # Сеть создана firecrawl docker-compose

volumes: {}