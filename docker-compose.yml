services:
  html_to_markdown:
    build:
      context: ./packages/go-html-to-md
      dockerfile: Dockerfile
    container_name: html_to_markdown
    restart: unless-stopped
    ports:
      - "8090:8080"  # Go service
    environment:
      - PORT=8080
      - ENV=production
      - TZ=Europe/Moscow
    networks:
      - flipper_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  cookie_manager:
    build:
      context: ./services/cookie_manager
      dockerfile: Dockerfile
    container_name: cookie_manager
    restart: unless-stopped
    ports:
      - "8000:8000"  # FastAPI
      - "8080:8080"  # NoVNC
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./services/cookie_manager/cookies.json:/app/cookies.json
    depends_on:
      - app_redis
    networks:
      - flipper_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  parser_cian:
    build:
      context: .  # Контекст - корень проекта
      dockerfile: ./services/parser_cian/Dockerfile
    container_name: parser_cian
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./credentials.json:/app/credentials.json
      - ./data:/app/data
    depends_on:
      cookie_manager:
        condition: service_healthy
      html_to_markdown:
        condition: service_healthy
    networks:
      - flipper_network
    profiles:
      - manual  # Запускается только вручную

  category_counter:
    build:
      context: .  # Контекст - корень проекта
      dockerfile: ./services/category_counter/Dockerfile
    container_name: category_counter
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
      - PYTHONPATH=/app
    volumes:
      - ./credentials.json:/app/credentials.json
    depends_on:
      html_to_markdown:
        condition: service_healthy
    networks:
      - flipper_network
    profiles:
      - manual  # Запускается только вручную

  app_redis:
    image: redis:alpine
    container_name: app_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - flipper_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  flipper_network:
    driver: bridge

volumes: {}