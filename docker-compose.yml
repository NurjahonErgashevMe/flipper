# Обнуляем proxy-переменные из .env для сервисов, которым прокси не нужен.
# cookie_manager получает .env как есть (env_file) — ему прокси могут быть нужны.
x-strip-proxy-env: &strip-proxy-env
  HTTP_PROXY: ""
  HTTPS_PROXY: ""
  http_proxy: ""
  https_proxy: ""
  ALL_PROXY: ""
  all_proxy: ""

services:
  html_to_markdown:
    image: flipper-html_to_markdown
    build:
      context: ./packages/go-html-to-md
      dockerfile: Dockerfile
    container_name: html_to_markdown
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      - PORT=8080
      - ENV=production
      - TZ=Europe/Moscow
    networks:
      - flipper_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  cookie_manager:
    image: flipper-cookie_manager
    build:
      context: ./services/cookie_manager
      dockerfile: Dockerfile
    container_name: cookie_manager
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8080:8080"
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
    volumes:
      - ./services/cookie_manager/cookies.json:/app/cookies.json
    depends_on:
      - app_redis
    networks:
      - flipper_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  app_postgres:
    image: postgres:16-alpine
    container_name: app_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flipper
      POSTGRES_USER: flipper
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-flipper_secret}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - flipper_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flipper"]
      interval: 10s
      timeout: 5s
      retries: 5

  parser_cian:
    image: flipper-parser_cian
    build:
      context: .
      dockerfile: ./services/parser_cian/Dockerfile
    container_name: parser_cian
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Europe/Moscow
      <<: *strip-proxy-env
      FIRECRAWL_BASE_URL: "${PARSER_FIRECRAWL_BASE_URL:-http://host.docker.internal:3002}"
      DATABASE_URL: "postgresql+asyncpg://flipper:${POSTGRES_PASSWORD:-flipper_secret}@app_postgres:5432/flipper"
    volumes:
      - ${FLIPPER_CREDENTIALS_SOURCE:-./credentials.json}:/app/credentials.json
      - ${FLIPPER_DATA_SOURCE:-./data}:/app/data
    depends_on:
      cookie_manager:
        condition: service_healthy
      html_to_markdown:
        condition: service_healthy
      app_postgres:
        condition: service_healthy
    networks:
      - flipper_network
      - firecrawl_backend
    profiles:
      - manual

  category_counter:
    image: flipper-category_counter
    build:
      context: .
      dockerfile: ./services/category_counter/Dockerfile
    container_name: category_counter
    env_file:
      - .env
    environment:
      TZ: Europe/Moscow
      PYTHONPATH: /app
      <<: *strip-proxy-env
    volumes:
      - ${FLIPPER_CREDENTIALS_SOURCE:-./credentials.json}:/app/credentials.json
      - ${FLIPPER_DATA_SOURCE:-./data}:/app/data
    depends_on:
      html_to_markdown:
        condition: service_healthy
    networks:
      - flipper_network
    profiles:
      - manual

  scheduler:
    image: flipper-scheduler
    build:
      context: .
      dockerfile: ./services/scheduler/Dockerfile
    container_name: flipper_scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Europe/Moscow
      <<: *strip-proxy-env
      # Имя контейнера для docker inspect (корень репо на хосте → FLIPPER_* в шедулере)
      SCHEDULER_CONTAINER_NAME: flipper_scheduler
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Корень репозитория в /app: шедулер через inspect берёт Source этого mount и подставляет
      # FLIPPER_CREDENTIALS_SOURCE / FLIPPER_DATA_SOURCE в compose run (иначе бинды указывают в /app на демоне).
      - .:/app
      - ./data:/app/data
    depends_on:
      cookie_manager:
        condition: service_healthy
      html_to_markdown:
        condition: service_healthy
      app_postgres:
        condition: service_healthy
    networks:
      - flipper_network

  app_redis:
    image: redis:alpine
    container_name: app_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - flipper_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  flipper_network:
    driver: bridge
  firecrawl_backend:
    external: true

volumes:
  pgdata:
